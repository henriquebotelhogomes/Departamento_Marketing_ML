site_name: CardSense — Marketing Analytics
site_description: Plataforma de segmentação inteligente de clientes de cartão de crédito
site_url: https://github.com/henri/cardsense
docs_dir: docs
theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo claro
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo escuro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - content.code.copy
    - content.code.annotate
  font:
    text: Inter
    code: Fira Code
  icon:
    logo: material/chart-scatter-plot

nav:
  - Início: index.md
  - Instalação: getting-started.md
  - Arquitetura: architecture.md
  - Modelo de Segmentação: segmentation-model.md
  - Pipeline de ML: ml-pipeline.md
  - API: api.md
  - Pipeline de Dados: data-pipeline.md
  - Contribuindo: contributing.md

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html