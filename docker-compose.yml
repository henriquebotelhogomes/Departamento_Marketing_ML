services:
  cardsense:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cardsense
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./data/production.db
      - NEXTAUTH_SECRET=cardsense-demo-secret-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
    volumes:
      - cardsense-data:/app/data
    restart: unless-stopped

volumes:
  cardsense-data:
